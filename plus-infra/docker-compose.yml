services:
  ministack:
    image: ministackorg/ministack
    container_name: ministack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,rds,apigateway,sts
      - DEBUG=0
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - ministack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4566/_localstack/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  infra-provisioner:
    image: hashicorp/terraform:latest
    container_name: infra-provisioner
    working_dir: /infra
    volumes:
      - ./terraform:/infra
    environment:
      - TF_VAR_endpoint=http://ministack:4566
      - TF_VAR_db_name=${DB_NAME:-plus_auth}
      - TF_VAR_db_user=${DB_USER:-plus}
      - TF_VAR_db_password=${DB_PASSWORD:-plus_secret}
    entrypoint: ["/bin/sh", "-c", "rm -f terraform.tfstate terraform.tfstate.backup && terraform init && terraform apply -auto-approve"]
    depends_on:
      ministack:
        condition: service_healthy

  # BACK-END DA CONSULTA
  plus-ms-consulta:
    build:
      context: ../plus-ms-consulta
      dockerfile: Dockerfile
    container_name: plus-ms-consulta
    ports:
      - "${MS_CONSULTA_PORT:-3067}:3067"
    environment:
      - NODE_ENV=development
      - PORT=3067
    depends_on:
      infra-provisioner:
        condition: service_completed_successfully
    restart: unless-stopped

  # FRONT-END DA CONSULTA (MFE)
  plus-mfe-consulta:
    build:
      context: ../plus-mfe-consulta
      dockerfile: Dockerfile
    container_name: plus-mfe-consulta
    ports:
      - "${MFE_CONSULTA_PORT:-3002}:3002"
    environment:
      - VITE_MS_CONSULTA_URL=http://localhost:3067
    depends_on:
      infra-provisioner:
        condition: service_completed_successfully
    restart: unless-stopped

  # O SHELL PRINCIPAL
  plus-shell:
    build:
      context: ../plus-shell
      dockerfile: Dockerfile
      args:
        - MFE_CONSULTA_URL=http://localhost:3002/assets/remoteEntry.js 
    container_name: plus-shell
    ports:
      - "${SHELL_PORT:-3000}:3000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ENDPOINT=http://ministack:4566
    depends_on:
      infra-provisioner:
        condition: service_completed_successfully
      plus-mfe-consulta:
        condition: service_started
    restart: unless-stopped

volumes:
  ministack_data: